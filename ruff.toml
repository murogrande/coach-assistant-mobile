line-length = 120

[lint]
select = ["E", "F", "W"]
ignore = ["E501"]  # line length handled by formatter, not linter

[lint.per-file-ignores]
"tests/**" = [
    "F841",  # unused variable (common in mock-heavy tests)
]
"main.py" = [
    "E402",  # Kivy requires Config.set() before any other kivy imports
]
